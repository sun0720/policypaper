name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 🔧 恢复 node_modules 缓存（基于 package-lock.json hash）
      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      # 🔧 恢复 Next.js 构建缓存（大幅加速重复构建）
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-cache-${{ github.sha }}
          restore-keys: |
            nextjs-cache-

      # 🔧 恢复数据解析缓存（避免重复 regex 解析 Markdown）
      - name: Restore data parser cache
        uses: actions/cache@v4
        with:
          path: data/.cache
          key: data-cache-${{ github.sha }}
          restore-keys: |
            data-cache-

      - run: npx next build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - uses: actions/deploy-pages@v4
